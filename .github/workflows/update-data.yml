name: Update CVM data

on:
  schedule:
    - cron: "0 12 * * 1"  # weekly, Monday 12:00 UTC (matches CVM's own weekly refresh)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/ingest.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/companies.json data/meta.json data/by_company data/monthly.json data/bb_monthly.json
          git diff --cached --quiet || git commit -m "Update CVM data"
          git push
